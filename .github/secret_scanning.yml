# GitExpose is a secret scanner: its test fixtures and design docs intentionally
# contain credential-shaped strings so the detectors can be tested. Exclude those
# paths from secret-scanning alerts (and, where supported, push protection) to
# avoid false positives on deliberately-fake fixture data.
paths-ignore:
  - "tests/fixtures/**"
  - "docs/superpowers/plans/**"
  - "docs/superpowers/specs/**"
  - "docs/v0.3-planning-notes.md"
